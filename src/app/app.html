<div>
  <div class="input-add-todo-list">
    <input
      type="text"
      class="search-input"
      [value]="task()"
      (input)="task.set($event.target.value)"
      [placeholder]="placeholder()"
    />

    <button class="button-add-task" (click)="addTask()" type="button">Add</button>
  </div>

  <div class="todo-list-wrapper">
    <app-todo-list></app-todo-list>
  </div>
</div>
